name: Auto Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Run Deploy Script
        shell: cmd
        run: |
          cd /d D:\web_v4\web_v4_pro
          echo "Dong bo code tu thu muc GitHub Actions sang thu muc Production..."
          git fetch "%GITHUB_WORKSPACE%"
          git reset --hard FETCH_HEAD
          echo "Thuc thi script deploy..."
          call deploy-vps.bat
