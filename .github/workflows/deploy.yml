name: Auto Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Run Deploy Script
        shell: cmd
        run: |
          cd /d D:\web_v4\web_v4_pro
          git fetch origin
          git reset --hard origin/main
          call deploy-vps.bat
