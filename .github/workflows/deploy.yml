name: Auto Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Run Deploy Script
        shell: cmd
        run: |
          cd /d D:\web_v4\web_v4_pro
          echo "Dang tien hanh tai code moi nhat tu nhanh main..."
          git fetch origin
          git reset --hard origin/main
          echo "Thuc thi script deploy-vps.bat..."
          call deploy-vps.bat
